<!-- https://getbootstrap.com/docs/4.2/components/buttons/ -->
<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/css/bootstrap.min.css"
        integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

    <title>Textutils</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">DRTextutils.com</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About Us</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        Dropdown
                    </a>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <a class="dropdown-item" href="#">Youtube Channel</a>
                        <a class="dropdown-item" href="#">Contect Us</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="#">Report</a>
                    </div>
                </li>
                <li class="nav-item">
                    <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">More optiions</a>
                </li>
            </ul>
            <form class="form-inline my-2 my-lg-0">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>


    <div class="alert alert-warning alert-dismissible fade show" role="alert">
        <strong>Welcome to Text Utils</strong> you can do anything with your text here !
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <div class="container">
        <form action="/analyze" method="post"> {% csrf_token %}
            <div class="form-group">
                <label for="exampleFormControlTextarea1"><b>Enter your text here and let Text utils do the magic</b></label>
                <textarea placeholder="Enter your text" class="form-control" name="text" id="exampleFormControlTextarea1" rows="8"></textarea>
            </div>



            <div class="custom-control custom-switch">
                <input type="checkbox" class="custom-control-input"  name="removepunc" id="customSwitch1">
                <label class="custom-control-label" for="customSwitch1">Remove punctuation</label>
            </div>

            <div class="custom-control custom-switch">
                <input type="checkbox" class="custom-control-input" name="newlineremover" id="customSwitch2">
                <label class="custom-control-label" for="customSwitch2">New Line Remover</label>
            </div>

            <div class="custom-control custom-switch">
                <input type="checkbox" class="custom-control-input" name="Extraspaceremover" id="customSwitch3">
                <label class="custom-control-label" for="customSwitch3">Extra Space Remover</label>
            </div>

            <div class="custom-control custom-switch">
                <input type="checkbox" class="custom-control-input" name="fullcaps" id="customSwitch4">
                <label class="custom-control-label" for="customSwitch4">UPPER CASE</label>
            </div>
            <div class="custom-control custom-switch">
                <input type="checkbox" class="custom-control-input" name=
                "charcount" id="customSwitch5">
                <label class="custom-control-label" for="customSwitch5">Charecter counter</label><br><br>
            </div>

            <button type="submit" class="btn btn-outline-success">Analyze text</button>
        </form>
    </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.6/dist/umd/popper.min.js"
        integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/js/bootstrap.min.js"
        integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k"
        crossorigin="anonymous"></script>
</body>

</html>
